<!DOCTYPE html>
<html lang="en">

<head>
    <title>KSON Monaco Editor</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { margin: 0; font-family: system-ui, sans-serif; }
        .header { padding: 16px 24px; }
        .header h1 { margin: 0; font-size: 1.4em; }
        .header p { margin: 4px 0 0; color: #666; font-size: 0.9em; }
        .editors {
            position: absolute;
            top: 120px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            gap: 2px;
            background: #e0e0e0;
        }
        .editors > div { flex: 1; min-width: 0; }
    </style>
</head>

<body>
    <div class="header">
        <h1>KSON Monaco Editor</h1>
        <p>Try adding an unknown key or removing "name" to see schema validation.</p>
    </div>

    <div class="editors">
        <div id="editor-left"></div>
        <div id="editor-right"></div>
    </div>

    <script type="module">
        import { createKsonEditor } from './src/index.js';

        // A JSON Schema that validates our sample config.
        const sampleSchema = `{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "type": "object",
  "properties": {
    "name":    { "type": "string", "description": "The name of the project" },
    "version": { "type": "string", "description": "Semantic version string" },
    "tags":    { "type": "array", "items": { "type": "string" } }
  },
  "required": ["name", "version"],
  "additionalProperties": false
}`;

        const leftDocument = `{
  # My project config
  name: "kson-monaco-editor"
  unknown: "should trigger schema error"
  tags: [
    "editor"
    "language-server"
  ]
}`;

        const rightDocument = `{
  name: "another-project"
  version: "1.0.0"
  tags: ["demo"]
}`;

        // Create the first editor — this starts the language server.
        const left = await createKsonEditor(document.getElementById('editor-left'), {
            value: leftDocument,
            uri: 'inmemory://kson/project.kson',
            lspOptions: {
                bundledSchemas: [
                    { fileExtension: 'kson', schemaContent: sampleSchema }
                ],
                enableBundledSchemas: true,
            },
        });

        // Create the second editor, sharing the same language server.
        const right = await createKsonEditor(document.getElementById('editor-right'), {
            value: rightDocument,
            uri: 'inmemory://kson/another.kson',
            shared: left,
        });

        console.log('KSON editors started successfully');
    </script>
</body>

</html>
