# !!!!!
# THIS FILE IS AUTO-GENERATED FROM config.kson
# DO NOT EDIT! IT WILL BE OVERWRITTEN ON NEXT BUILD
# TO MODIFY, EDIT config.kson AND RUN ANY GRADLE TASK
# !!!!!
version: 2.1
orbs:
  # Ensure access to browser tools so we can install Chrome below for JS Kotlin tests
  # See https://circleci.com/developer/orbs/orb/circleci/browser-tools for details
  "browser-tools": "circleci/browser-tools@1.1"
  # Windows support for testing Python on Windows
  windows: "circleci/windows@5.0"

# Reusable command definitions - only for truly cross-platform operations
commands:
  "gradle-core-tasks":
    description: "Run core Gradle build and verification tasks"
    steps:
      - run:
          name: "Download dependencies"
          command: "./gradlew --no-daemon dependencies"

      - run:
          name: "Verify buildSrc project"
          command: "cd buildSrc\n./gradlew --no-daemon check\n"

      - run:
          name: "Verify Kson project"
          command: "./gradlew --no-daemon check"

      - run:
          name: "Build native kson-lib"
          command: "./gradlew --no-daemon :kson-lib:buildWithGraalVmNativeImage"

      - run:
          name: "Verify clean checkout"
          command: "./gradlew --no-daemon verifyCleanCheckout"


  "store-native-artifacts":
    description: "Store build artifacts in a consistent way"
    steps:
      - store_artifacts:
          path: "kson-lib/build/bin/nativeKson/releaseShared"
          destination: "kson-lib-shared"

      - store_artifacts:
          path: "kson-lib/build/bin/nativeKson/releaseStatic"
          destination: "kson-lib-static"


  "restore-build-caches":
    description: "Restore Gradle dependency, rattler, and uv caches shared by build and Python jobs"
    parameters:
      platform:
        type: string
        description: "Platform identifier for cache keys"

    steps:
      - restore_cache:
          keys:
            - "v1-<< parameters.platform >>-dependencies-{{ checksum \"build.gradle.kts\" }}"
            - "v1-<< parameters.platform >>-dependencies-"
      - restore_cache:
          keys:
            - "v1-<< parameters.platform >>-rattler-{{ checksum \"kson-lib/pixi.lock\" }}"
            - "v1-<< parameters.platform >>-rattler-"
      - restore_cache:
          keys:
            - "v1-<< parameters.platform >>-uv-{{ checksum \"lib-python/uv.lock\" }}"
            - "v1-<< parameters.platform >>-uv-"

  "save-build-caches":
    description: "Save Gradle dependency, rattler, and uv caches shared by build and Python jobs"
    parameters:
      platform:
        type: string
        description: "Platform identifier for cache keys"

    steps:
      - save_cache:
          paths:
            - "~/.gradle"
          key: "v1-<< parameters.platform >>-dependencies-{{ checksum \"build.gradle.kts\" }}"

      - save_cache:
          paths:
            - "~/.cache/rattler"
            - "~/Library/Caches/rattler"
            - "~/AppData/Local/rattler"
          key: "v1-<< parameters.platform >>-rattler-{{ checksum \"kson-lib/pixi.lock\" }}"

      - save_cache:
          paths:
            - "~/.cache/uv"
            - "~/Library/Caches/uv"
            - "~/AppData/Local/uv"
          key: "v1-<< parameters.platform >>-uv-{{ checksum \"lib-python/uv.lock\" }}"


  # Gradle build cache, scoped to build-linux-amd64 only (keeps stale cached output out of release artifacts).
  # Escape hatch: if CI misbehaves inexplicably, bump the v1->v2 prefix on both keys below to bust the cache.
  "restore-gradle-build-cache":
    description: "Restore the Gradle build cache for build-linux-amd64"
    steps:
      - restore_cache:
          keys:
            - "v1-linux-amd64-gradle-build-cache-"

  "save-gradle-build-cache":
    description: "Save the Gradle build cache for build-linux-amd64 (see runbook above)"
    steps:
      - save_cache:
          paths:
            - "~/.gradle/caches/build-cache-1"
          key: "v1-linux-amd64-gradle-build-cache-{{ .Revision }}"


  "restore-gradle-caches":
    description: "Restore all caches for the full cross-platform build jobs"
    parameters:
      platform:
        type: string
        description: "Platform identifier for cache keys"

    steps:
      - "restore-build-caches":
          platform: "<< parameters.platform >>"
      - restore_cache:
          keys:
            - "v2-<< parameters.platform >>-vscode-tests"
      - restore_cache:
          keys:
            - "v1-<< parameters.platform >>-pnpm-store-{{ checksum \"tooling/lsp-clients/pnpm-lock.yaml\" }}-{{ checksum \"tooling/language-server-protocol/pnpm-lock.yaml\" }}"
            - "v1-<< parameters.platform >>-pnpm-store-"

  "save-gradle-caches":
    description: "Save all caches for the full cross-platform build jobs"
    parameters:
      platform:
        type: string
        description: "Platform identifier for cache keys"

    steps:
      - "save-build-caches":
          platform: "<< parameters.platform >>"
      - save_cache:
          paths:
            # Mirror vscodeTestCache.ts OS defaults for the VS Code electron download
            - "./tooling/lsp-clients/vscode/.vscode-test-web"
            - "~/.cache/kson-vscode-test"
            - "~/Library/Caches/kson-vscode-test"
            - "~/AppData/Roaming/kson-vscode-test"
          key: "v2-<< parameters.platform >>-vscode-tests"

      - save_cache:
          paths:
            - "~/.local/share/pnpm/store"
            - "~/Library/pnpm/store"
          key: "v1-<< parameters.platform >>-pnpm-store-{{ checksum \"tooling/lsp-clients/pnpm-lock.yaml\" }}-{{ checksum \"tooling/language-server-protocol/pnpm-lock.yaml\" }}"


  "clean-git-config":
    description: "Remove erroneous git config across platforms"
    parameters:
      shell:
        type: enum
        enum:
          - bash
          - powershell
        default: bash

    steps:
      - when:
          condition:
            equal:
              - "<< parameters.shell >>"
              - bash
          steps:
            - run:
                name: "Clean git config"
                command: "rm -rf ~/.gitconfig"


      - when:
          condition:
            equal:
              - "<< parameters.shell >>"
              - powershell
          steps:
            - run:
                name: "Clean git config"
                command: "Remove-Item -Path \"$env:USERPROFILE\\.gitconfig\" -Force -ErrorAction SilentlyContinue\n"
                shell: "powershell.exe"



  "setup-python-test":
    description: "Common setup for Python sdist testing"
    parameters:
      platform:
        type: string
    steps:
      - checkout
      - when:
          condition:
            equal:
              - "<< parameters.platform >>"
              - windows
          steps:
            - "clean-git-config":
                shell: powershell

      - when:
          condition:
            not:
              equal:
                - "<< parameters.platform >>"
                - windows
          steps:
            - "clean-git-config":
                shell: bash

      - attach_workspace:
          at: "~/repo"

  "run-python-tests-unix":
    description: "Run Python sdist tests and build wheel for Unix-like systems"
    steps:
      - run:
          name: "Install kson from sdist"
          command: "python3 -m pip install lib-python/dist/kson_lang-*.tar.gz"

      - run:
          name: "Install test dependencies"
          command: "python3 -m pip install pytest"

      - run:
          name: "Run smoke tests on sdist installation"
          command: "python3 -m pytest lib-python -v"

      - run:
          name: "Build platform-specific wheel"
          command: "./gradlew :lib-python:buildWheel"



# Job definitions
jobs:
  "build-windows-amd64":
    resource_class: "windows.large"
    machine:
      image: "windows-server-2022-gui:current"
      shell: "powershell.exe -ExecutionPolicy Bypass"

    environment:
      JVM_OPTS: "-Xmx3200m"
    steps:
      - checkout
      - "clean-git-config":
          shell: powershell
      # Windows-specific installations
      # The `browser-tools` orb doesn't support windows, so we install Chrome manually
      - run:
          name: "Install Chrome"
          command: "choco install googlechrome --ignore-checksums"

      - "restore-gradle-caches":
          platform: "win-amd64"
      # Cross-platform Gradle tasks
      - "gradle-core-tasks"
      - "store-native-artifacts"
      - "save-gradle-caches":
          platform: "win-amd64"

  "build-linux-amd64":
    docker:
      - image: "cimg/node:lts-browsers"
    working_directory: "~/repo"
    environment:
      JVM_OPTS: "-Xmx3200m"
      GRADLE_OPTS: "-Dorg.gradle.caching=true"
      TERM: dumb
      DISPLAY: ":99"

    resource_class: large
    steps:
      - "browser-tools/install-chrome"
      - checkout
      - run:
          name: "Verify Chrome installation"
          command: "google-chrome --version"

      - run:
          name: "Start virtual display"
          command: "Xvfb :99 -screen 0 1280x1024x24 &"
          background: true

      - "restore-gradle-caches":
          platform: "linux-amd64"
      - "restore-gradle-build-cache"
      - "clean-git-config":
          shell: bash
      # Cross-platform Gradle tasks
      - "gradle-core-tasks"
      - "store-native-artifacts"
      - "save-gradle-build-cache"
      - "save-gradle-caches":
          platform: "linux-amd64"

  "build-macos-arm64":
    macos:
      xcode: "16.4.0"
    resource_class: "m4pro.medium"
    working_directory: "~/repo"
    steps:
      - run:
          name: "Install Chrome"
          command: "brew install --cask google-chrome"

      - checkout
      - run:
          name: "Verify Chrome installation"
          command: "\"/Applications/Google Chrome.app/Contents/MacOS/Google Chrome\" --version"

      - "clean-git-config":
          shell: bash
      - "restore-gradle-caches":
          platform: "macos-arm64"
      # Cross-platform Gradle tasks
      - "gradle-core-tasks"
      - "store-native-artifacts"
      - "save-gradle-caches":
          platform: "macos-arm64"

  "build-python-sdist":
    docker:
      - image: "cimg/python:3.11"
    working_directory: "~/repo"
    steps:
      - checkout
      - "clean-git-config":
          shell: bash
      - "restore-build-caches":
          platform: "linux-amd64"
      - run:
          name: "Build Python source distribution"
          command: "./gradlew :lib-python:createSdistBuildEnvironment"

      - run:
          name: "Verify sdist was created"
          command: "ls -la lib-python/dist/\ntest -f lib-python/dist/kson_lang-*.tar.gz\n"

      - persist_to_workspace:
          root: "~/repo"
          paths:
            - "lib-python/dist/*.tar.gz"

      - "save-build-caches":
          platform: "linux-amd64"
      - store_artifacts:
          path: "lib-python/dist"
          destination: "python-sdist"


  "test-python-sdist-linux-amd64":
    docker:
      - image: "cimg/python:3.11"
    working_directory: "~/repo"
    steps:
      - "setup-python-test":
          platform: linux
      - "restore-build-caches":
          platform: "linux-amd64"
      - setup_remote_docker
      - "run-python-tests-unix"
      - "save-build-caches":
          platform: "linux-amd64"
      - store_artifacts:
          path: "lib-python/dist"
          destination: "python-linux-amd64"


  "test-python-sdist-macos":
    macos:
      xcode: "14.2.0"
    working_directory: "~/repo"
    steps:
      - "setup-python-test":
          platform: macos
      - "restore-build-caches":
          platform: "macos-python"
      - "run-python-tests-unix"
      - "save-build-caches":
          platform: "macos-python"
      - store_artifacts:
          path: "lib-python/dist"
          destination: "python-macos"


  "test-python-sdist-windows":
    executor:
      name: "windows/default"
      size: medium

    working_directory: "~/repo"
    steps:
      - "setup-python-test":
          platform: windows
      - "restore-build-caches":
          platform: "windows-python"
      - run:
          name: "Check Python version and upgrade if needed"
          command: "python --version\npython -m pip install --upgrade pip\n"

      - run:
          name: "Install kson from sdist"
          command: "python -m pip install (Get-ChildItem lib-python/dist/kson_lang-*.tar.gz).FullName\n"
          shell: "powershell.exe"

      - run:
          name: "Install test dependencies"
          command: "python -m pip install pytest"

      - run:
          name: "Run smoke tests on sdist installation"
          command: "python -m pytest lib-python -v"

      - run:
          name: "Build platform-specific wheel"
          command: ".\\gradlew.bat :lib-python:buildWheel --no-daemon\n"

      - "save-build-caches":
          platform: "windows-python"
      - store_artifacts:
          path: "lib-python/dist"
          destination: "python-windows"



workflows:
  version: 2
  # Main build workflow - runs on version tags
  "build-all":
    jobs:
      - "build-linux-amd64"
      - "build-windows-amd64":
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"
      - "build-macos-arm64":
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"
  "build-python-and-test":
    jobs:
      - "build-python-sdist":
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"
      - "test-python-sdist-linux-amd64":
          requires:
            - "build-python-sdist"
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"

      - "test-python-sdist-macos":
          requires:
            - "build-python-sdist"
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"

      - "test-python-sdist-windows":
          requires:
            - "build-python-sdist"
          filters:
            branches:
              only: "/release.*\\d+\\.\\d+\\.\\d+$/"