[workspace]
authors = ["Adolfo Ochagavía <github@adolfo.ochagavia.nl>"]
channels = ["conda-forge"]
name = "lib-rust"
platforms = [
    "linux-64",
    "linux-aarch64",
    "osx-arm64",
    "osx-64",
    "win-64",
]
# [[kson-version-num]]
version = "0.3.0-dev"

[tasks]

[dependencies]
rust = "1.89.0.*"

[target.win-64.dependencies]
vs2022_win-64 = ">=19.44.35207,<20"
# Provides Library/bin/libclang-13.dll (via libclang13), which bindgen needs. There is deliberately
# no LIBCLANG_PATH here: pixi does not expand `$CONDA_PREFIX` in [activation.env] on Windows, and
# the DLL's name does not match what clang-sys looks for anyway. kson-sys/build.rs handles both.
libclang = "20.*"

[target.linux-64.dependencies]
libclang = "20.*"
sysroot_linux-64 = ">=2.34"
zlib = "==1.3.1"

[target.linux-64.activation.env]
LIBCLANG_PATH = "$CONDA_PREFIX/lib"

[target.linux-aarch64.dependencies]
libclang = "20.*"
sysroot_linux-64 = ">=2.34"
zlib = "==1.3.1"

[target.linux-aarch64.activation.env]
LIBCLANG_PATH = "$CONDA_PREFIX/lib"
